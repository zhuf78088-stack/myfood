<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>зҫҺйЈҹеҶҢеӯҗ - з®ЎзҗҶеҗҺеҸ°</title>
  <style>
    :root {
      --primary: #E8652A;
      --primary-light: #FFF3ED;
      --primary-dark: #C94E18;
      --accent: #F4A34B;
      --success: #28a745;
      --danger: #dc3545;
      --warning: #ffc107;
      --info: #17a2b8;
      --text-main: #2D1A0E;
      --text-sub: #6C4A35;
      --text-muted: #9E7A65;
      --bg: #F8F4F0;
      --sidebar-bg: #2D1A0E;
      --sidebar-hover: rgba(255,255,255,0.08);
      --sidebar-active: rgba(232,101,42,0.2);
      --card-bg: #FFFFFF;
      --border: #EDE0D5;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
      --radius: 12px;
      --radius-sm: 8px;
      --sidebar-w: 220px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
    }

    /* ===== зҷ»еҪ•йЎө ===== */
    #loginPage {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #2D1A0E 0%, #5C3520 40%, #E8652A 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px;
      width: 360px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .login-logo { font-size: 48px; margin-bottom: 8px; }
    .login-title { font-size: 22px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }
    .form-item { margin-bottom: 16px; text-align: left; }
    .form-item label { display: block; font-size: 13px; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; }
    .form-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      color: var(--text-main);
    }
    .form-input:focus { border-color: var(--primary); }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.92; }
    .login-hint { font-size: 12px; color: var(--text-muted); margin-top: 14px; }
    .login-err { color: var(--danger); font-size: 13px; margin-top: 8px; min-height: 18px; }

    /* ===== дё»еёғеұҖ ===== */
    #app { display: flex; height: 100vh; }

    /* дҫ§иҫ№ж Ҹ */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }
    .sidebar-head {
      padding: 20px 16px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; }
    .sidebar-logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .sidebar-logo-text { color: #fff; font-size: 16px; font-weight: 700; }
    .sidebar-logo-sub { color: rgba(255,255,255,0.45); font-size: 11px; margin-top: 1px; }

    .sidebar-section { padding: 16px 8px 8px; }
    .sidebar-section-label {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 0 8px;
      margin-bottom: 6px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: rgba(255,255,255,0.65);
      font-size: 14px;
      font-weight: 500;
      transition: all 0.15s;
      margin-bottom: 2px;
    }
    .nav-item:hover { background: var(--sidebar-hover); color: rgba(255,255,255,0.9); }
    .nav-item.active { background: var(--sidebar-active); color: var(--accent); font-weight: 600; }
    .nav-item-icon { font-size: 16px; width: 20px; text-align: center; }
    .nav-badge {
      margin-left: auto;
      background: var(--primary);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 10px;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .user-avatar {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #fff; font-weight: 700; flex-shrink: 0;
    }
    .user-name { color: rgba(255,255,255,0.85); font-size: 13px; font-weight: 600; }
    .user-role { color: rgba(255,255,255,0.4); font-size: 11px; }
    .logout-btn {
      width: 100%;
      padding: 8px;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9); }

    /* дё»еҶ…е®№еҢә */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .top-bar {
      background: var(--card-bg);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 var(--border);
      flex-shrink: 0;
    }
    .top-bar-title { font-size: 18px; font-weight: 700; color: var(--text-main); }
    .top-bar-right { display: flex; align-items: center; gap: 12px; }
    .h5-link {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
      padding: 6px 12px;
      border: 1.5px solid var(--primary);
      border-radius: 20px;
      transition: all 0.15s;
    }
    .h5-link:hover { background: var(--primary-light); }

    .content-panel {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    /* ===== йҖҡз”Ёз»„д»¶ ===== */
    /* еҚЎзүҮ */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 20px;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .card-title { font-size: 16px; font-weight: 700; color: var(--text-main); }

    /* з»ҹи®ЎеҚЎзүҮ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 18px 20px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .stat-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .stat-icon.orange { background: #FFF0E8; }
    .stat-icon.green { background: #E8F8ED; }
    .stat-icon.blue { background: #E8F4FF; }
    .stat-icon.purple { background: #F0E8FF; }
    .stat-num { font-size: 26px; font-weight: 700; color: var(--text-main); }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* жҢүй’® */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-sub); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-icon { padding: 7px; }

    /* иЎЁж ј */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #FBF5F0; }
    th {
      padding: 10px 14px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 12px 14px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      color: var(--text-main);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #FBF5F0; }

    /* еҫҪз«  */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-success { background: #E8F8ED; color: #1a8a40; }
    .badge-danger { background: #FEE; color: #c0392b; }
    .badge-warning { background: #FFF8E1; color: #b8860b; }
    .badge-default { background: #F0EFEE; color: var(--text-muted); }

    /* жҗңзҙў/иҝҮж»Өж Ҹ */
    .filter-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      align-items: center;
    }
    .filter-input {
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      outline: none;
      color: var(--text-main);
      min-width: 180px;
    }
    .filter-input:focus { border-color: var(--primary); }
    .filter-select {
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      outline: none;
      color: var(--text-main);
      background: #fff;
      cursor: pointer;
    }
    .filter-select:focus { border-color: var(--primary); }

    /* иҸңе“ҒеӣҫзүҮзј©з•Ҙеӣҫ */
    .dish-thumb {
      width: 44px; height: 44px;
      border-radius: 8px;
      object-fit: cover;
      background: #F5EDE5;
    }
    .dish-thumb-placeholder {
      width: 44px; height: 44px;
      border-radius: 8px;
      background: #FFF0E8;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    /* жҺ’еәҸжҢүй’® */
    .order-btns { display: flex; gap: 2px; }
    .order-btn {
      padding: 3px 7px;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      color: var(--text-muted);
    }
    .order-btn:hover { border-color: var(--primary); color: var(--primary); }
    .order-btn:disabled { opacity: 0.3; cursor: default; }

    /* жӢ–жӢҪжҺ’еәҸ */
    #catTableWrap tr[draggable] { cursor: grab; }
    #catTableWrap tr.drag-over { background: var(--primary-light); outline: 2px dashed var(--primary); }
    .drag-handle { cursor: grab !important; }

    /* еӣҫзүҮйў„и§Ҳжө®еұӮ */
    .img-preview-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      z-index: 99999; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 20px;
    }
    .img-preview-overlay.show { display: flex; }
    .img-preview-full { max-width: 94vw; max-height: 80vh; border-radius: 8px; object-fit: contain; }
    .img-preview-close {
      position: absolute; top: 16px; right: 16px;
      width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.15);
      color: #fff; border: none; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; z-index: 1;
    }

    /* ===== еј№зӘ— ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 5000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow-lg);
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }
    .modal-head {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close {
      width: 30px; height: 30px;
      border: none;
      background: var(--bg);
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
    }
    .modal-body {
      padding: 20px 24px;
      overflow-y: auto;
      flex: 1;
    }
    .modal-foot {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* иЎЁеҚ• */
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; }
    .field-input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      outline: none;
      color: var(--text-main);
      transition: border-color 0.2s;
    }
    .field-input:focus { border-color: var(--primary); }
    .field-select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      outline: none;
      color: var(--text-main);
      background: #fff;
      cursor: pointer;
    }
    .field-select:focus { border-color: var(--primary); }
    .field-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* еӣҫзүҮдёҠдј еҢә */
    .img-upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      position: relative;
    }
    .img-upload-zone:hover { border-color: var(--primary); }
    .img-upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .img-upload-icon { font-size: 28px; margin-bottom: 6px; color: var(--text-muted); }
    .img-upload-text { font-size: 13px; color: var(--text-muted); }

    .img-preview-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .img-preview-item {
      position: relative;
      width: 72px; height: 72px;
    }
    .img-preview-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .img-preview-del {
      position: absolute;
      top: -6px; right: -6px;
      width: 20px; height: 20px;
      background: var(--danger);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 11px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* Toast жҸҗзӨә */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      box-shadow: var(--shadow-lg);
      animation: slideIn 0.3s ease;
      max-width: 280px;
    }
    .toast-success { background: var(--success); }
    .toast-error { background: var(--danger); }
    .toast-info { background: var(--info); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* зЎ®и®Өеј№зӘ— */
    .confirm-modal { max-width: 360px; }
    .confirm-text { font-size: 14px; color: var(--text-sub); line-height: 1.7; }

    /* з©әжҖҒ */
    .empty-row td {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* еҲҶйЎө */
    .pagination {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
      padding: 12px 0 0;
    }
    .page-btn {
      padding: 6px 12px;
      border: 1.5px solid var(--border);
      background: #fff;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-sub);
    }
    .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .page-btn:disabled { opacity: 0.4; cursor: default; }
    .page-info { font-size: 12px; color: var(--text-muted); margin-right: 4px; }

    /* ж»ҡеҠЁжқЎзҫҺеҢ– */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>

<!-- зҷ»еҪ•йЎө -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo">рҹҚң</div>
    <div class="login-title">зҫҺйЈҹеҶҢеӯҗ</div>
    <div class="login-sub">еҗҺеҸ°з®ЎзҗҶзі»з»ҹ</div>
    <div class="form-item">
      <label>з”ЁжҲ·еҗҚ</label>
      <input class="form-input" id="loginUser" type="text" placeholder="иҜ·иҫ“е…Ҙз”ЁжҲ·еҗҚ" value="admin" />
    </div>
    <div class="form-item">
      <label>еҜҶз Ғ</label>
      <input class="form-input" id="loginPass" type="password" placeholder="иҜ·иҫ“е…ҘеҜҶз Ғ" value="admin123" onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <button class="login-btn" onclick="doLogin()">зҷ» еҪ•</button>
    <div class="login-err" id="loginErr"></div>
    <div class="login-hint">й»ҳи®ӨиҙҰеҸ·пјҡadmin / admin123</div>
  </div>
</div>

<!-- дё»еёғеұҖ -->
<div id="app" style="display:none">
  <!-- дҫ§иҫ№ж Ҹ -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">рҹҚң</div>
        <div>
          <div class="sidebar-logo-text">зҫҺйЈҹеҶҢеӯҗ</div>
          <div class="sidebar-logo-sub">иҝҗиҗҘз®ЎзҗҶеҗҺеҸ°</div>
        </div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">дё»иҸңеҚ•</div>
      <div class="nav-item active" data-page="dashboard" onclick="switchPage('dashboard',this)">
        <span class="nav-item-icon">рҹ“Ҡ</span> ж•°жҚ®жҰӮи§Ҳ
      </div>
      <div class="nav-item" data-page="category" onclick="switchPage('category',this)">
        <span class="nav-item-icon">рҹ“Ӯ</span> иҸңе“ҒеҲҶзұ»
      </div>
      <div class="nav-item" data-page="dish" onclick="switchPage('dish',this)">
        <span class="nav-item-icon">рҹҚҪпёҸ</span> иҸңе“Ғз®ЎзҗҶ
      </div>
      <div class="nav-item" data-page="user" onclick="switchPage('user',this)">

<script>
  /* ========================

  let currentUser = null;

  let editingId = null;
  let keepImageUrls = [];      // зј–иҫ‘ж—¶дҝқз•ҷзҡ„жңҚеҠЎеҷЁеӣҫзүҮ URL

  /* ж №жҚ®еӣҫзүҮж ҮиҜҶиҺ·еҸ–еҸҜз”ЁдәҺ <img src="..."> зҡ„еҖјпјҲжүҖжңүеӣҫзүҮеқҮдёә URLпјү */
  function resolveImageSrc(pic) {
    return pic || null;
  }

  let dishFilter = { keyword: '', categoryId: '', status: '' };

  /* ========================
     зҷ»еҪ• / зҷ»еҮә
  ======================== */
  async function doLogin() {
    var u = document.getElementById('loginUser').value.trim();
    var p = document.getElementById('loginPass').value.trim();

      var result = await DB.login(u, p);
      currentUser = result.admin;
    } catch (e) {
      document.getElementById('loginErr').textContent = 'зҷ»еҪ•еӨұиҙҘ: ' + (e.message || 'зҪ‘з»ңй”ҷиҜҜ');

    }
    if (!currentUser) {
      document.getElementById('loginErr').textContent = 'з”ЁжҲ·еҗҚжҲ–еҜҶз Ғй”ҷиҜҜ';
      return;
    }
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display = 'flex';

  /* ========================
     йЎөйқўеҲҮжҚў
  ======================== */
  const pageTitles = { dashboard: 'ж•°жҚ®жҰӮи§Ҳ', category: 'иҸңе“ҒеҲҶзұ»з®ЎзҗҶ', dish: 'иҸңе“Ғз®ЎзҗҶ', user: 'з”ЁжҲ·з®ЎзҗҶ' };

  async function switchPage(page, el) {

  /* ========================
     Toast жҸҗзӨә
  ======================== */
  function showToast(msg, type = 'success') {
    const box = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.textContent = msg;
    box.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.4s'; }, 2200);
    setTimeout(() => t.remove(), 2700);
  }

  /* ========================
     еј№зӘ—е·Ҙе…·
  ======================== */
  function openModal(title, body, foot) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = body;
    document.getElementById('modalFoot').innerHTML = foot;
    document.getElementById('modalOverlay').classList.add('show');
  }
  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
    keepImageUrls = [];
    pendingImageFiles = [];
    editingId = null;
  }

  function confirmDlg(msg, onOk) {
    openModal(
      'зЎ®и®Өж“ҚдҪң',
      `<div class="confirm-text">${msg}</div>`,
      `<button class="btn btn-outline" onclick="closeModal()">еҸ–ж¶Ҳ</button>
       <button class="btn btn-danger" id="confirmOkBtn">зЎ®и®ӨеҲ йҷӨ</button>`
    );
    document.getElementById('confirmOkBtn').onclick = () => { closeModal(); onOk(); };
  }

  /* ========================
     ж•°жҚ®жҰӮи§Ҳ
  ======================== */
  async function renderDashboard() {
    var cats = await DB.getCategories();
    var dishes = await DB.getDishes();
    var onDishes = dishes.filter(d => d.status === 'on').length;
    var offDishes = dishes.filter(d => d.status === 'off').length;
    var admins = await DB.getAdmins();

    // жңҖж–°иҸңе“ҒпјҲжңҖиҝ‘5жқЎпјү
    const latest = [...dishes].sort((a,b) => b.id - a.id).slice(0, 5);

    document.getElementById('contentPanel').innerHTML = `
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon orange">рҹҚҪпёҸ</div>
          <div><div class="stat-num">${dishes.length}</div><div class="stat-label">иҸңе“ҒжҖ»ж•°</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">вң…</div>
          <div><div class="stat-num">${onDishes}</div><div class="stat-label">е·ІдёҠжһ¶иҸңе“Ғ</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue">рҹ“Ӯ</div>
          <div><div class="stat-num">${cats.filter(c=>c.enabled).length}</div><div class="stat-label">еҗҜз”ЁеҲҶзұ»</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon purple">рҹ‘Ө</div>
          <div><div class="stat-num">${admins.length}</div><div class="stat-label">з®ЎзҗҶе‘ҳиҙҰеҸ·</div></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">еҲҶзұ»иҸңе“ҒжҰӮи§Ҳ</div>
          <button class="btn btn-primary btn-sm" onclick="switchPage('dish', document.querySelector('.nav-item[data-page=dish]'))">з®ЎзҗҶиҸңе“Ғ</button>

        <div class="table-wrap">

            <thead><tr><th>еҲҶзұ»еҗҚз§°</th><th>зҠ¶жҖҒ</th><th>иҸңе“Ғж•°</th><th>е·ІдёҠжһ¶</th><th>ж“ҚдҪң</th></tr></thead>
            <tbody>

                  <td>${c.enabled

                  <td>${cnt}</td>
                  <td>${onCnt}</td>
                  <td><button class="btn btn-outline btn-sm" onclick="switchPage('dish',document.querySelector('.nav-item[data-page=dish]'));setTimeout(()=>{document.getElementById('dishCatFilter').value='${c.id}';applyDishFilter()},100)">жҹҘзңӢиҸңе“Ғ</button></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">жңҖж–°еҪ•е…ҘиҸңе“Ғ</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>еӣҫзүҮ</th><th>еҗҚз§°</th><th>еҲҶзұ»</th><th>зҠ¶жҖҒ</th><th>еҪ•е…Ҙж—¶й—ҙ</th></tr></thead>
            <tbody>
              ${latest.length === 0
                ? '<tr class="empty-row"><td colspan="5">жҡӮж— иҸңе“Ғж•°жҚ®</td></tr>'
                : latest.map(d => {
                    const cat = cats.find(c => c.id === d.categoryId);
                    const img = d.images && d.images[0] ? `<img class="dish-thumb" src="${d.images[0]}" alt="" onerror="this.outerHTML='<div class=dish-thumb-placeholder>рҹҚҪпёҸ</div>'" />` : '<div class="dish-thumb-placeholder">рҹҚҪпёҸ</div>';
                    return `<tr>
                      <td>${img}</td>
                      <td><strong>${d.name}</strong></td>
                      <td>${cat ? `<span class="badge badge-default">${cat.name}</span>` : '-'}</td>
                      <td>${d.status === 'on' ? '<span class="badge badge-success">дёҠжһ¶</span>' : '<span class="badge badge-danger">дёӢжһ¶</span>'}</td>
                      <td>${d.createdAt || '-'}</td>

          </table>
        </div>
      </div>
    `;
  }

  /* ========================
     иҸңе“ҒеҲҶзұ»з®ЎзҗҶ
  ======================== */
  function renderCategoryPage() {
    document.getElementById('contentPanel').innerHTML = `
      <div class="card">
        <div class="card-header">
          <div class="card-title">еҲҶзұ»еҲ—иЎЁ</div>
          <button class="btn btn-primary" onclick="openCatModal()">пјӢ ж–°еўһеҲҶзұ»</button>
        </div>
        <div class="filter-bar">
          <input class="filter-input" id="catKeyword" placeholder="жҗңзҙўеҲҶзұ»еҗҚз§°..." oninput="renderCategoryList()" />
        </div>
        <div class="table-wrap" id="catTableWrap"></div>
      </div>
    `;
    renderCategoryList();
  }

  async function renderCategoryList() {
    var kw = (document.getElementById('catKeyword') ? document.getElementById('catKeyword').value : '').toLowerCase();
    var cats = await DB.getCategories();
    if (kw) cats = cats.filter(function(c) { return c.name.toLowerCase().indexOf(kw) !== -1; });
    var dishes = await DB.getDishes();

    var tbody = cats.length === 0
      ? '<tr class="empty-row"><td colspan="7">жҡӮж— еҲҶзұ»ж•°жҚ®</td></tr>'
      : cats.map(function(c, idx) {
          var cnt = dishes.filter(function(d) { return d.categoryId === c.id; }).length;
          return '<tr draggable="true" ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="dropCat(event)" ondragend="dragEnd(event)" data-cat-id="' + c.id + '" data-cat-idx="' + idx + '">' +
            '<td class="drag-handle" style="cursor:grab;text-align:center;font-size:20px;color:#999;user-select:none">вӢ®вӢ®</td>' +
            '<td><strong>' + c.name + '</strong></td>' +
            '<td>' + (c.enabled
              ? '<span class="badge badge-success">вң“ еҗҜз”Ё</span>'
              : '<span class="badge badge-danger">вң— зҰҒз”Ё</span>') + '</td>' +
            '<td>' + cnt + ' йҒ“иҸңе“Ғ</td>' +
            '<td>з¬¬ ' + c.order + ' дҪҚ</td>' +
            '<td>' +
              '<div style="display:flex;gap:6px">' +
                '<button class="btn btn-outline btn-sm" onclick="openCatModal(' + c.id + ')">зј–иҫ‘</button>' +
                '<button class="btn btn-sm" style="background:' + (c.enabled ? '#FFF8E1;color:#b8860b' : '#E8F8ED;color:#1a8a40') + '" onclick="toggleCat(' + c.id + ')">' +
                  (c.enabled ? 'зҰҒз”Ё' : 'еҗҜз”Ё') +
                '</button>' +
                '<button class="btn btn-danger btn-sm" onclick="delCat(' + c.id + ',\'' + c.name + '\')">еҲ йҷӨ</button>' +
              '</div>' +
            '</td>' +
          '</tr>';
        }).join('');

    document.getElementById('catTableWrap').innerHTML =
      '<table>' +
        '<thead><tr><th style="width:40px"></th><th>еҲҶзұ»еҗҚз§°</th><th>зҠ¶жҖҒ</th><th>иҸңе“Ғж•°йҮҸ</th><th>жҺ’еәҸ</th><th>ж“ҚдҪң</th></tr></thead>' +
        '<tbody>' + tbody + '</tbody>' +
      '</table>';
  }

  // ===== еӣҫзүҮйў„и§Ҳ =====
  function openPreview(src) {
    document.getElementById('imgPreviewFull').src = src;
    document.getElementById('imgPreviewOverlay').classList.add('show');
  }
  function closeImgPreview() {
    document.getElementById('imgPreviewOverlay').classList.remove('show');
  }
  window.openPreview = openPreview;
  window.closeImgPreview = closeImgPreview;

  // ===== жӢ–жӢҪжҺ’еәҸ =====
  var dragRow = null;

  window.dragStart = function(e) {
    dragRow = e.target.closest('tr');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', '');
    dragRow.style.opacity = '0.5';
  };

  window.dragOver = function(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    var target = e.target.closest('tr');
    if (target && target !== dragRow && target.dataset.catId) {
      var rect = target.getBoundingClientRect();
      if (e.clientY - rect.top < rect.height / 2) {
        target.parentNode.insertBefore(dragRow, target);
      } else {
        target.parentNode.insertBefore(dragRow, target.nextSibling);
      }
    }
  };

  window.dropCat = async function(e) {
    e.preventDefault();
    if (!dragRow) return;

    // иҺ·еҸ–ж–°йЎәеәҸпјҡж”¶йӣҶжүҖжңүиЎҢзҡ„ cat-id
    var rows = document.querySelectorAll('#catTableWrap tbody tr[data-cat-id]');
    var newOrder = [];
    for (var i = 0; i < rows.length; i++) {
      newOrder.push(parseInt(rows[i].dataset.catId));
    }

    // жӣҙж–°ж•°жҚ®еә“дёӯзҡ„жҺ’еәҸ
    for (var j = 0; j < newOrder.length; j++) {
      await DB.updateCategory(newOrder[j], { order: j + 1 });
    }

    // еҲ·ж–°еҲ—иЎЁ
    renderCategoryList();
    showToast('жҺ’еәҸе·Іжӣҙж–°');
  };

  window.dragEnd = function(e) {
    if (dragRow) dragRow.style.opacity = '1';
    dragRow = null;
  };

  async function openCatModal(id) {
    var cats = await DB.getCategories();
    var cat = id ? cats.find(function(c) { return c.id === id; }) : null;
    editingId = id || null;
    openModal(
      id ? 'зј–иҫ‘еҲҶзұ»' : 'ж–°еўһеҲҶзұ»',
      `<div class="field">
        <label>еҲҶзұ»еҗҚз§° <span style="color:var(--danger)">*</span></label>
        <input class="field-input" id="catNameInput" placeholder="иҜ·иҫ“е…ҘеҲҶзұ»еҗҚз§°" value="${cat ? cat.name : ''}" />
      </div>`,
      `<button class="btn btn-outline" onclick="closeModal()">еҸ–ж¶Ҳ</button>
       <button class="btn btn-primary" onclick="saveCat()">дҝқеӯҳ</button>`
    );
  }

  async function saveCat() {
    var name = document.getElementById('catNameInput').value.trim();
    if (!name) { showToast('иҜ·иҫ“е…ҘеҲҶзұ»еҗҚз§°', 'error'); return; }
    if (editingId) {
      await DB.updateCategory(editingId, { name: name });
      showToast('еҲҶзұ»е·Іжӣҙж–°');
    } else {
      await DB.addCategory(name);
      showToast('еҲҶзұ»ж–°еўһжҲҗеҠҹ');
    }
    closeModal();
    renderCategoryList();
  }

  async function toggleCat(id) {
    var cats = await DB.getCategories();
    var cat = cats.find(function(c) { return c.id === id; });
    var newEnabled = !cat.enabled;
    await DB.updateCategory(id, { enabled: newEnabled });
    showToast(newEnabled ? 'еҲҶзұ»е·ІеҗҜз”Ё' : 'еҲҶзұ»е·ІзҰҒз”Ё');
    renderCategoryList();
  }

  function delCat(id, name) {
    confirmDlg('зЎ®и®ӨеҲ йҷӨеҲҶзұ»гҖҢ' + name + 'гҖҚпјҹжӯӨж“ҚдҪңдёҚеҸҜжҒўеӨҚгҖӮ', async function() {
      await DB.deleteCategory(id);
      showToast('еҲҶзұ»е·ІеҲ йҷӨ');
      renderCategoryList();
    });
  }

  async function moveCat(id, dir) {
    var cats = await DB.getCategories();
    var idx = cats.findIndex(function(c) { return c.id === id; });
    if (dir === 'up' && idx > 0) {
      var prev = cats[idx - 1];
      await DB.updateCategory(id, { order: prev.order });
      await DB.updateCategory(prev.id, { order: cats[idx].order });
    } else if (dir === 'down' && idx < cats.length - 1) {
      var next = cats[idx + 1];
      await DB.updateCategory(id, { order: next.order });
      await DB.updateCategory(next.id, { order: cats[idx].order });
    }
    renderCategoryList();
  }

  /* ========================
     иҸңе“Ғз®ЎзҗҶ
  ======================== */
  async function renderDishPage() {
    var cats = await DB.getCategories();
    document.getElementById('contentPanel').innerHTML = `
      <div class="card">
        <div class="card-header">
          <div class="card-title">иҸңе“ҒеҲ—иЎЁ</div>
          <button class="btn btn-primary" onclick="openDishModal()">пјӢ ж–°еўһиҸңе“Ғ</button>
        </div>
        <div class="filter-bar">
          <input class="filter-input" id="dishKeyword" placeholder="жҗңзҙўиҸңе“ҒеҗҚз§°..." oninput="applyDishFilter()" style="min-width:160px" />
          <select class="filter-select" id="dishCatFilter" onchange="applyDishFilter()">
            <option value="">е…ЁйғЁеҲҶзұ»</option>
            ${cats.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
          </select>
          <select class="filter-select" id="dishStatusFilter" onchange="applyDishFilter()">
            <option value="">е…ЁйғЁзҠ¶жҖҒ</option>
            <option value="on">е·ІдёҠжһ¶</option>
            <option value="off">е·ІдёӢжһ¶</option>
          </select>
        </div>
        <div class="table-wrap" id="dishTableWrap"></div>
        <div class="pagination" id="dishPagination"></div>
      </div>
    `;
    renderDishList();
  }

  function applyDishFilter() {
    dishFilter.keyword = document.getElementById('dishKeyword') ? document.getElementById('dishKeyword').value.trim() : '';
    var catVal = document.getElementById('dishCatFilter') ? document.getElementById('dishCatFilter').value : '';
    dishFilter.categoryId = catVal ? parseInt(catVal) : '';
    dishFilter.status = document.getElementById('dishStatusFilter') ? document.getElementById('dishStatusFilter').value : '';
    dishPage = 1;
    renderDishList();
  }

  async function renderDishList() {
    var cats = await DB.getCategories();
    var filters = {};
    if (dishFilter.keyword) filters.keyword = dishFilter.keyword;
    if (dishFilter.categoryId) filters.categoryId = dishFilter.categoryId;
    if (dishFilter.status) filters.status = dishFilter.status;

    var allDishes = await DB.getDishes(filters);
    var total = allDishes.length;
    var totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if (dishPage > totalPages) dishPage = totalPages;
    var paged = allDishes.slice((dishPage - 1) * PAGE_SIZE, dishPage * PAGE_SIZE);

    var tbody = paged.length === 0
      ? '<tr class="empty-row"><td colspan="7">жҡӮж— иҸңе“Ғж•°жҚ®</td></tr>'
      : paged.map(function(d) {
          var cat = cats.find(function(c) { return c.id === d.categoryId; });
          var imgSrc = (d.images && d.images[0]) ? d.images[0] : '';
          var img = imgSrc
            ? '<img class="dish-thumb" src="' + imgSrc + '" alt="" onerror="this.outerHTML=\'<div class=dish-thumb-placeholder>рҹҚҪпёҸ</div>\'" />'
            : '<div class="dish-thumb-placeholder">рҹҚҪпёҸ</div>';
          return '<tr>' +
            '<td>' + img + '</td>' +
            '<td><strong>' + d.name + '</strong></td>' +
            '<td>' + (cat ? '<span class="badge badge-default">' + cat.name + '</span>' : '<span style="color:var(--text-muted)">жңӘеҲҶзұ»</span>') + '</td>' +
            '<td>' + (d.status === 'on'
              ? '<span class="badge badge-success">дёҠжһ¶</span>'
              : '<span class="badge badge-danger">дёӢжһ¶</span>') + '</td>' +
            '<td>' + (d.images ? d.images.length : 0) + ' еј </td>' +
            '<td>' + (d.createdAt || '-') + '</td>' +
            '<td>' +
              '<div style="display:flex;gap:6px;flex-wrap:wrap">' +
                '<button class="btn btn-outline btn-sm" onclick="openDishModal(' + d.id + ')">зј–иҫ‘</button>' +
                '<button class="btn btn-sm" style="background:' + (d.status === 'on' ? '#FFF8E1;color:#b8860b' : '#E8F8ED;color:#1a8a40') + '" onclick="toggleDish(' + d.id + ')">' +
                  (d.status === 'on' ? 'дёӢжһ¶' : 'дёҠжһ¶') +
                '</button>' +
                '<button class="btn btn-danger btn-sm" onclick="delDish(' + d.id + ',\'' + d.name + '\')">еҲ йҷӨ</button>' +
              '</div>' +
            '</td>' +
          '</tr>';
        }).join('');

    document.getElementById('dishTableWrap').innerHTML = `
      <table>
        <thead><tr><th>еӣҫзүҮ</th><th>иҸңе“ҒеҗҚз§°</th><th>жүҖеұһеҲҶзұ»</th><th>зҠ¶жҖҒ</th><th>еӣҫзүҮж•°</th><th>еҪ•е…Ҙж—¶й—ҙ</th><th>ж“ҚдҪң</th></tr></thead>
        <tbody>${tbody}</tbody>
      </table>
    `;

    // еҲҶйЎө
    let pages = '';
    if (total > 0) {
      pages += `<span class="page-info">е…ұ ${total} жқЎпјҢз¬¬ ${dishPage}/${totalPages} йЎө</span>`;
      pages += `<button class="page-btn" onclick="dishPage=1;renderDishList()" ${dishPage<=1?'disabled':''}>В«</button>`;
      pages += `<button class="page-btn" onclick="dishPage--;renderDishList()" ${dishPage<=1?'disabled':''}>вҖ№</button>`;
      for (let i = Math.max(1, dishPage-2); i <= Math.min(totalPages, dishPage+2); i++) {
        pages += `<button class="page-btn ${i===dishPage?'active':''}" onclick="dishPage=${i};renderDishList()">${i}</button>`;
      }
      pages += `<button class="page-btn" onclick="dishPage++;renderDishList()" ${dishPage>=totalPages?'disabled':''}>вҖә</button>`;
      pages += `<button class="page-btn" onclick="dishPage=${totalPages};renderDishList()" ${dishPage>=totalPages?'disabled':''}>В»</button>`;
    }
    document.getElementById('dishPagination').innerHTML = pages;
  }

  async function openDishModal(id) {
    var dish = null;
    if (id) {
      var all = await DB.getDishes();
      dish = all.find(function(d) { return d.id === id; });
    }
    editingId = id || null;
    keepImageUrls = dish ? (dish.images || []).slice() : [];
    pendingImageFiles = [];

    var cats = await DB.getCategories();
    cats = cats.filter(function(c) { return c.enabled; });

    var catsOpt = cats.map(function(c) {
      return '<option value="'+c.id+'"' + (dish && dish.categoryId === c.id ? ' selected' : '') + '>'+c.name+'</option>';
    }).join('');

    openModal(
      id ? 'зј–иҫ‘иҸңе“Ғ' : 'ж–°еўһиҸңе“Ғ',
      '<div class="field">' +
        '<label>жүҖеұһеҲҶзұ» <span style="color:var(--danger)">*</span></label>' +
        '<select class="field-select" id="dishCatInput">' +
          '<option value="">иҜ·йҖүжӢ©еҲҶзұ»</option>' + catsOpt +
        '</select>' +
      '</div>' +
      '<div class="field">' +
        '<label>иҸңе“ҒеҗҚз§° <span style="color:var(--danger)">*</span></label>' +
        '<input class="field-input" id="dishNameInput" placeholder="иҜ·иҫ“е…ҘиҸңе“ҒеҗҚз§°" value="' + (dish ? dish.name : '') + '" />' +
      '</div>' +
      '<div class="field">' +
        '<label>иҸңе“ҒеӣҫзүҮ</label>' +
        '<div class="img-upload-zone">' +
          '<input type="file" id="imgFileInput" accept="image/*" multiple style="width:100%;height:100%;position:absolute;top:0;left:0;opacity:0;cursor:pointer" onchange="handleImgUpload(this)" />' +
          '<div class="img-upload-icon">рҹ“·</div>' +
          '<div class="img-upload-text">зӮ№еҮ»дёҠдј еӣҫзүҮпјҲж”ҜжҢҒеӨҡеј пјҢJPG/PNG/WebPпјү</div>' +
        '</div>' +
        '<div class="img-preview-list" id="imgPreviewList"></div>' +
        '<div class="field-hint">е·Іж·»еҠ  <span id="imgCount">' + keepImageUrls.length + '</span> еј еӣҫзүҮ</div>' +
      '</div>' +
      '<div class="field">' +
        '<label>дёҠжһ¶зҠ¶жҖҒ</label>' +
        '<select class="field-select" id="dishStatusInput">' +
          '<option value="on"' + (!dish || dish.status === 'on' ? ' selected' : '') + '>дёҠжһ¶пјҲH5з«Ҝеұ•зӨәпјү</option>' +
          '<option value="off"' + (dish && dish.status === 'off' ? ' selected' : '') + '>дёӢжһ¶пјҲH5з«Ҝйҡҗи—Ҹпјү</option>' +
        '</select>' +
      '</div>',
      '<button class="btn btn-outline" onclick="closeModal()">еҸ–ж¶Ҳ</button>' +
      '<button class="btn btn-primary" onclick="saveDish()">дҝқеӯҳиҸңе“Ғ</button>'
    );
    renderImgPreviews();
  }

  function triggerImgUpload() {
    document.getElementById('imgFileInput').click();
  }

  function handleImgUpload(input) {
    var files = Array.from(input.files);
    files.forEach(function(file) {
      pendingImageFiles.push(file);
    });
    renderImgPreviews();
    input.value = '';
  }

  function renderImgPreviews() {
    var list = document.getElementById('imgPreviewList');
    if (!list) return;
    list.innerHTML = '';

    // е…ҲжёІжҹ“дҝқз•ҷзҡ„ж—§еӣҫ URL
    for (var i = 0; i < keepImageUrls.length; i++) {
      var el = document.createElement('div');
      el.className = 'img-preview-item';
      el.innerHTML = '<img src="' + keepImageUrls[i] + '" alt="еӣҫ'+(i+1)+'" onclick="event.stopPropagation();openPreview(\'' + keepImageUrls[i] + '\',\'еӣҫзүҮйў„и§Ҳ\')" style="cursor:pointer" /><button class="img-preview-del" onclick="removeKeepImg(' + i + ')">вң•</button>';
      list.appendChild(el);
    }
    // еҶҚжёІжҹ“ж–°дёҠдј зҡ„ж–Үд»¶йў„и§Ҳ
    for (var j = 0; j < pendingImageFiles.length; j++) {
      var url = URL.createObjectURL(pendingImageFiles[j]);
      var el2 = document.createElement('div');
      el2.className = 'img-preview-item';
      el2.innerHTML = '<img src="' + url + '" alt="ж–°еӣҫ'+(j+1)+'" onclick="event.stopPropagation();openPreview(\'' + url + '\',\'еӣҫзүҮйў„и§Ҳ\')" style="cursor:pointer" /><button class="img-preview-del" onclick="removeNewImg(' + j + ')">вң•</button>';
      list.appendChild(el2);
    }

    var cnt = document.getElementById('imgCount');
    if (cnt) cnt.textContent = keepImageUrls.length + pendingImageFiles.length;
  }

  window.removeKeepImg = function(idx) {
    keepImageUrls.splice(idx, 1);
    renderImgPreviews();
  };
  window.removeNewImg = function(idx) {
    pendingImageFiles.splice(idx, 1);
    renderImgPreviews();
  };

  async function saveDish() {
    var catId = parseInt(document.getElementById('dishCatInput').value);
    var name = document.getElementById('dishNameInput').value.trim();
    var status = document.getElementById('dishStatusInput').value;
    if (!catId) { showToast('иҜ·йҖүжӢ©жүҖеұһеҲҶзұ»', 'error'); return; }
    if (!name) { showToast('иҜ·иҫ“е…ҘиҸңе“ҒеҗҚз§°', 'error'); return; }

    if (editingId) {
      await DB.updateDish(editingId, { categoryId: catId, name: name, status: status }, pendingImageFiles, keepImageUrls);
      showToast('иҸңе“Ғе·Іжӣҙж–°');
    } else {
      await DB.addDish({ categoryId: catId, name: name, status: status }, pendingImageFiles);
      showToast('иҸңе“Ғж–°еўһжҲҗеҠҹ');
    }
    closeModal();
    renderDishList();
  }

  async function toggleDish(id) {
    var dishes = await DB.getDishes();
    var dish = dishes.find(function(d) { return d.id === id; });
    var newStatus = dish.status === 'on' ? 'off' : 'on';
    await DB.updateDish(id, { status: newStatus });
    showToast(newStatus === 'on' ? 'иҸңе“Ғе·ІдёҠжһ¶' : 'иҸңе“Ғе·ІдёӢжһ¶');
    renderDishList();
  }

  function delDish(id, name) {
    confirmDlg('зЎ®и®ӨеҲ йҷӨиҸңе“ҒгҖҢ' + name + 'гҖҚпјҹжӯӨж“ҚдҪңдёҚеҸҜжҒўеӨҚгҖӮ', async function() {
      await DB.deleteDish(id);
      showToast('иҸңе“Ғе·ІеҲ йҷӨ');
      renderDishList();
    });
  }

  /* ========================
     з”ЁжҲ·з®ЎзҗҶ
  ======================== */
  function renderUserPage() {
    document.getElementById('contentPanel').innerHTML = `
      <div class="card">
        <div class="card-header">
          <div class="card-title">з®ЎзҗҶе‘ҳиҙҰеҸ·еҲ—иЎЁ</div>
          <button class="btn btn-primary" onclick="openUserModal()">пјӢ ж–°еўһиҙҰеҸ·</button>
        </div>
        <div class="filter-bar">
          <input class="filter-input" id="userKeyword" placeholder="жҗңзҙўз”ЁжҲ·еҗҚжҲ–е§“еҗҚ..." oninput="renderUserList()" />
        </div>
        <div class="table-wrap" id="userTableWrap"></div>
      </div>
    `;
    renderUserList();
  }

  async function renderUserList() {
    var kwEl = document.getElementById('userKeyword');
    var kw = (kwEl ? kwEl.value : '').toLowerCase();
    var admins = await DB.getAdmins();
    if (kw) admins = admins.filter(function(a) {
      return a.username.toLowerCase().indexOf(kw) !== -1 || a.name.toLowerCase().indexOf(kw) !== -1;
    });

    const tbody = admins.length === 0
      ? '<tr class="empty-row"><td colspan="5">жҡӮж— иҙҰеҸ·ж•°жҚ®</td></tr>'
      : admins.map(a => `
          <tr>
            <td>
              <div style="display:flex;align-items:center;gap:10px">
                <div style="width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px">${a.name[0]}</div>
                <div><div style="font-weight:600">${a.name}</div><div style="font-size:12px;color:var(--text-muted)">${a.username}</div></div>
              </div>
            </td>
            <td>${a.username}</td>
            <td><span style="color:var(--text-muted);font-size:12px">в—Ҹв—Ҹв—Ҹв—Ҹв—Ҹв—Ҹ</span></td>
            <td>${a.createdAt || '-'}</td>
            <td>
              <div style="display:flex;gap:6px">
                <button class="btn btn-outline btn-sm" onclick="openUserModal(${a.id})">зј–иҫ‘</button>
                ${a.id === (currentUser && currentUser.id)
                  ? '<span style="font-size:12px;color:var(--text-muted);padding:5px">пјҲеҪ“еүҚиҙҰеҸ·пјү</span>'
                  : `<button class="btn btn-danger btn-sm" onclick="delUser(${a.id},'${a.name}')">еҲ йҷӨ</button>`}
              </div>
            </td>
          </tr>
        `).join('');

    document.getElementById('userTableWrap').innerHTML = `
      <table>
        <thead><tr><th>е§“еҗҚ</th><th>з”ЁжҲ·еҗҚ</th><th>еҜҶз Ғ</th><th>еҲӣе»әж—¶й—ҙ</th><th>ж“ҚдҪң</th></tr></thead>
        <tbody>${tbody}</tbody>
      </table>
    `;
  }

  async function openUserModal(id) {
    var admins = await DB.getAdmins();
    var admin = id ? admins.find(function(a) { return a.id === id; }) : null;
    editingId = id || null;
    openModal(
      id ? 'зј–иҫ‘иҙҰеҸ·' : 'ж–°еўһиҙҰеҸ·',
      `<div class="field">
        <label>е§“еҗҚ <span style="color:var(--danger)">*</span></label>
        <input class="field-input" id="adminNameInput" placeholder="иҜ·иҫ“е…Ҙзңҹе®һе§“еҗҚ" value="${admin ? admin.name : ''}" />
      </div>
      <div class="field">
        <label>з”ЁжҲ·еҗҚ <span style="color:var(--danger)">*</span></label>
        <input class="field-input" id="adminUserInput" placeholder="иҜ·иҫ“е…Ҙзҷ»еҪ•з”ЁжҲ·еҗҚ" value="${admin ? admin.username : ''}" />
      </div>
      <div class="field">
        <label>еҜҶз Ғ ${id ? '<span style="color:var(--text-muted);font-weight:400">пјҲдёҚеЎ«еҲҷдҝқз•ҷеҺҹеҜҶз Ғпјү</span>' : '<span style="color:var(--danger)">*</span>'}</label>
        <input class="field-input" id="adminPassInput" type="password" placeholder="${id ? 'дёҚдҝ®ж”№иҜ·з•ҷз©ә' : 'иҜ·и®ҫзҪ®зҷ»еҪ•еҜҶз Ғ'}" />
      </div>`,
      `<button class="btn btn-outline" onclick="closeModal()">еҸ–ж¶Ҳ</button>
       <button class="btn btn-primary" onclick="saveUser()">дҝқеӯҳ</button>`
    );
  }

  async function saveUser() {
    var name = document.getElementById('adminNameInput').value.trim();
    var username = document.getElementById('adminUserInput').value.trim();
    var password = document.getElementById('adminPassInput').value.trim();
    if (!name) { showToast('иҜ·иҫ“е…Ҙе§“еҗҚ', 'error'); return; }
    if (!username) { showToast('иҜ·иҫ“е…Ҙз”ЁжҲ·еҗҚ', 'error'); return; }
    if (!editingId && !password) { showToast('иҜ·и®ҫзҪ®еҜҶз Ғ', 'error'); return; }

    var admins = await DB.getAdmins();
    var dup = admins.find(function(a) { return a.username === username && a.id !== editingId; });
    if (dup) { showToast('з”ЁжҲ·еҗҚе·ІеӯҳеңЁ', 'error'); return; }

    if (editingId) {
      var updates = { name: name, username: username };
      if (password) updates.password = password;
      await DB.updateAdmin(editingId, updates);
      showToast('иҙҰеҸ·е·Іжӣҙж–°');
    } else {
      await DB.addAdmin({ name: name, username: username, password: password });
      showToast('иҙҰеҸ·ж–°еўһжҲҗеҠҹ');
    }
    closeModal();
    renderUserList();
  }

  function delUser(id, name) {
    confirmDlg('зЎ®и®ӨеҲ йҷӨз®ЎзҗҶе‘ҳиҙҰеҸ·гҖҢ' + name + 'гҖҚпјҹеҲ йҷӨеҗҺиҜҘиҙҰеҸ·е°Ҷж— жі•зҷ»еҪ•еҗҺеҸ°гҖӮ', async function() {
      await DB.deleteAdmin(id);
      showToast('иҙҰеҸ·е·ІеҲ йҷӨ');
      renderUserList();
    });
  }

  /* ========================
     зӮ№еҮ»йҒ®зҪ©е…ій—ӯеј№зӘ—
  ======================== */
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });
</script>
</body>
</html>
